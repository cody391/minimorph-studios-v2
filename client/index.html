    <!-- Schema.org structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "MiniMorph Studios",
      "description": "Custom website design and ongoing management for any business, anywhere",
      "url": "https://www.minimorphstudios.net",
      "email": "hello@minimorphstudios.net",
      "priceRange": "$195-$495/month",
      "serviceType": "Web Design",
      "areaServed": "Worldwide",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Website Design & Management Plans",
        "itemListElement": [
          {
            "@type": "Offer",
            "name": "Starter Plan",
            "itemOffered": {
              "@type": "Service",
              "name": "Starter Website Plan",
              "description": "Up to 5 pages, mobile-responsive design, contact form, basic SEO, customer portal, monthly report, 1 content update per month, email support"
            },
            "price": "195",
            "priceCurrency": "USD"
          },
          {
            "@type": "Offer",
            "name": "Growth Plan",
            "itemOffered": {
              "@type": "Service",
              "name": "Growth Website Plan",
              "description": "Up to 10 pages, blog/news section, Google Analytics, 2 content updates per month, AI-assisted recommendations, priority email support"
            },
            "price": "295",
            "priceCurrency": "USD"
          },
          {
            "@type": "Offer",
            "name": "Pro Plan",
            "itemOffered": {
              "@type": "Service",
              "name": "Pro Website Plan",
              "description": "Up to 20 pages, advanced SEO, 4 content updates per month, review widget, booking integration, SMS lead alerts, priority support"
            },
            "price": "395",
            "priceCurrency": "USD"
          },
        ]
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do I own my website?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You own your content, branding, and domain — always. The site itself is built and hosted as part of your MiniMorph Studios subscription. If you ever cancel, we'll work with you on transferring your files. No hostage situations."
          }
        },
        {
          "@type": "Question",
          "name": "What does AI-assisted actually mean?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "It means our AI tools analyze your site performance, spot broken links, flag slow pages, and suggest improvements. But a real human reviews everything before it touches your site. Think of it as a really diligent intern that never sleeps."
          }
        },
        {
          "@type": "Question",
          "name": "How long until I see my first draft?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Usually 48–72 hours after you complete your Elena onboarding session. The biggest variable is you — the faster you complete onboarding, the faster we start building. We won't start guessing what your business does."
          }
        },
        {
          "@type": "Question",
          "name": "What if I need ecommerce?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Online stores, product catalogs, and payment integrations require a custom quote. We'll scope it together — reach out to hello@minimorphstudios.net and we'll figure out the right fit with no surprise invoices."
          }
        },
        {
          "@type": "Question",
          "name": "Can I cancel early?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Plans are 12-month agreements. If something changes, reach out and we'll talk through your options like adults. Setup fees are non-refundable once work begins, and monthly fees are billed in advance."
          }
        },
        {
          "@type": "Question",
          "name": "What's the customer portal?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "It's your home base — project status, support tickets, monthly reports, file uploads, AI recommendations, and direct communication with our team. Every plan includes it. You'll use it more than you think."
          }
        },
        {
          "@type": "Question",
          "name": "Do you work with businesses outside the US?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — MiniMorph Studios works with businesses worldwide. Our process is fully remote and digital from day one. You'll have a dedicated portal, direct communication with your team, and regular check-ins no matter where you're located."
          }
        },
        {
          "@type": "Question",
          "name": "Do you guarantee results?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We don't promise specific traffic numbers or revenue targets — anyone who does is lying. What we do guarantee: a professionally built site, monthly maintenance, real reports, and AI-powered recommendations that get smarter over time."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a setup fee?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "There's no separate setup fee — your first month's payment covers the build, design, and launch. What you pay per month is what you pay every month. No surprise invoices."
          }
        },
        {
          "@type": "Question",
          "name": "How is MiniMorph Studios different from Wix or Squarespace?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Wix and Squarespace give you a tool and leave you to figure it out. We give you a team. We build the site for you, maintain it every month, provide real analytics, AI recommendations, and actual human support. You never touch a template — we handle everything."
          }
        },
        {
          "@type": "Question",
          "name": "What happens when my 12-month agreement ends?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "After your 12 months, you can cancel with 30 days' written notice — no penalty, no runaround. Early cancellation requires payment of remaining months in the agreement. Your content and domain are always yours to take."
          }
        }
      ]
    }
    </script>
